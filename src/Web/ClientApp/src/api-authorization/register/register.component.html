<article>
  <h2>Register</h2>
  @if (error) {
    <p class="error">{{ error }}</p>
  }
  <form (ngSubmit)="register()">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" [(ngModel)]="email"
      [attr.aria-invalid]="emailTouched ? !emailValid : null"
      aria-describedby="email-helper"
      autocomplete="username"
      (blur)="emailTouched = true" />
    <small id="email-helper">
      {{ emailTouched && !emailValid ? 'Please enter a valid email address.' : '' }}
    </small>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" [(ngModel)]="password"
      [attr.aria-invalid]="passwordTouched ? !passwordValid : null"
      aria-describedby="password-helper"
      autocomplete="new-password"
      (blur)="passwordTouched = true" />
    <small id="password-helper">
      {{ passwordTouched && !passwordValid ? 'Password must be at least ' + minPasswordLength + ' characters.' : '' }}
    </small>
    <button type="submit">Register</button>
    <p style="margin-top: 1rem">Already have an account? <a [routerLink]="['/login']">Log in</a></p>
  </form>
</article>
